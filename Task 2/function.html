<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function</title>
    <script>
        function hello()
        {
            let a= parseInt(prompt("value of a"));
            let b= parseInt(prompt("value of b"));
            c=a+b;
            document.write(c);
        }
    </script>
</head>
<body>
    <input type="button" onclick="hello()" value="Result">
</body>
</html>
