<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ABES 2nd Year: A</h1>

        <form>
            <label>First Name</label>
            <input type="text" placeholder="Enter First Name" required>
            <label>Second Name</label>
            <input type="text" placeholder="Enter Second Name" required>
            <label>Address</label>
            <input type="text" placeholder="Enter Address" required>
            <label>Email</label>
            <input type="email" placeholder="Enter Email" required>
            <label>Password</label>
            <input type="password" placeholder="Enter Password" required>
            <label>Gender</label>
            <div class="gender">
                <input type="radio" name="gender"> Male
                <input type="radio" name="gender"> Female
                </div>
            <label>Contact No.</label>
            <input type="tel" placeholder="Enter Contact Number" required>
            <label>Course</label>
            <div class="gender">
                <input type="checkbox" name="Course"> B.Tech
                <input type="checkbox" name="Course"> BCA
                <input type="checkbox" name="Course"> MSc(Computer Science)
                </div>
            <button type="submit">Register</button>
        </form>
    </div>
</body>
</html>
